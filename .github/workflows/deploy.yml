name: Deploy to Railway

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test Next.js
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Type Check
        working-directory: ./frontend
        run: npm run type-check

      - name: Build Project
        working-directory: ./frontend
        run: npm run build

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only deploy on pushes to the main branch (skip deployment on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        # We run this from the root space because our railway.toml 
        # is positioned there and correctly handles the frontend subdirectory
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
